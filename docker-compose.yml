services:
  db:
    image: postgres:latest
    container_name: chatapp_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: chatapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    image: redis:latest
    container_name: chatapp_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
